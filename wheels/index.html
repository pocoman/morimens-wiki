<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명륜 — 망각전야 아카이브</title>
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="../index.html" class="site-title">망각전야 아카이브</a>
      <nav>
        <a href="../index.html">홈</a>
        <a href="../characters/index.html">각성체</a>
        <a href="../wheels/index.html" class="active">명륜</a>
        <a href="../keyflares/index.html">은열쇠</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h1>명륜 <span>Wheel of Destiny</span></h1>
    </div>

    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="이름 / 효과 검색...">
      <div class="filter-group grade-group">
        <button class="filter-btn active" data-value="all">전체</button>
        <button class="filter-btn" data-value="SSR">SSR</button>
        <button class="filter-btn" data-value="SR">SR</button>
        <button class="filter-btn" data-value="R">R</button>
      </div>
      <span class="result-count" id="result-count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>명륜명</th>
            <th>등급</th>
            <th>고유</th>
            <th>효과 요약</th>
          </tr>
        </thead>
        <tbody id="wheel-tbody"></tbody>
      </table>
    </div>
  </main>

  <div class="panel-overlay" id="panel-overlay"></div>
  <aside class="detail-panel" id="detail-panel">
    <button class="panel-close" id="panel-close">✕</button>
    <div id="panel-content"></div>
  </aside>

  <footer>
    마지막 갱신: 2026년 5월 21일
  </footer>
  <script src="../data/wheels.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const tbody  = document.getElementById('wheel-tbody');
    const overlay = document.getElementById('panel-overlay');
    const panel   = document.getElementById('detail-panel');
    const content = document.getElementById('panel-content');

    function closePanel() {
      panel.classList.remove('open');
      overlay.classList.remove('open');
    }

    function openPanel(w) {
      const d = w.detail;
      const gradeTag = `<span class="tag tag-${w.grade.toLowerCase()}">${w.grade}</span>`;
      const exclusiveTag = w.exclusive
        ? `<span class="tag tag-exclusive">${w.exclusive}</span>` : '';

      let html = `
        <div class="panel-title">${w.name}</div>
        <div class="panel-title-en">${w.nameEn}</div>
        <div class="panel-tags">${gradeTag}${exclusiveTag}</div>
      `;

      html += `
        <div class="panel-section">
          <div class="panel-section-title">메인 스탯</div>
          <div class="main-stat-value">${d.mainStat}</div>
        </div>
      `;

      if (d.subEffects && d.subEffects.length) {
        html += `<div class="panel-section"><div class="panel-section-title">서브 효과</div>`;
        d.subEffects.forEach(eff => {
          const vals = eff.values.map((v, i) =>
            `<span class="subeffect-val"><span class="val-label">E${i}</span>${v}</span>`
          ).join('');
          html += `
            <div class="subeffect-item">
              <div class="subeffect-desc">${eff.desc}</div>
              <div class="subeffect-values">${vals}</div>
            </div>
          `;
        });
        html += `</div>`;
      }

      if (d.fixedEffects && d.fixedEffects.length) {
        html += `<div class="panel-section"><div class="panel-section-title">고정 효과</div>`;
        d.fixedEffects.forEach(eff => {
          html += `<div class="fixed-effect-item">${eff}</div>`;
        });
        html += `</div>`;
      }

      content.innerHTML = html;
      panel.classList.add('open');
      overlay.classList.add('open');
    }

    document.getElementById('panel-close').addEventListener('click', closePanel);
    overlay.addEventListener('click', closePanel);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

    WHEELS.forEach(w => {
      const tr = document.createElement('tr');
      tr.dataset.grade = w.grade;

      const gradeTag = `<span class="tag tag-${w.grade.toLowerCase()}">${w.grade}</span>`;
      const exclusiveCell = w.exclusive
        ? `<span class="tag tag-exclusive">${w.exclusive}</span>`
        : '<span style="color:var(--text-muted)">—</span>';

      tr.innerHTML = `
        <td>
          <div class="name-ko">${w.name}</div>
          <div class="name-en">${w.nameEn}</div>
        </td>
        <td>${gradeTag}</td>
        <td>${exclusiveCell}</td>
        <td><div class="effect-text">${w.effect}</div></td>
      `;

      if (w.detail) {
        tr.classList.add('tr-clickable');
        tr.addEventListener('click', () => openPanel(w));
      }

      tbody.appendChild(tr);
    });

    setupSearch('search-input', 'wheel-tbody');
    setupFilterBtns('grade-group', 'wheel-tbody');
    applyFilters('wheel-tbody');
  </script>
</body>
</html>
